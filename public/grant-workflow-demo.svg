<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">DueVault scoped auditor grant workflow</title>
  <desc id="desc">Animated storyboard showing a merchant selecting invoice evidence, issuing a scoped grant, and an auditor reviewing only granted records.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbf7ed"/>
      <stop offset="1" stop-color="#f4ead6"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#123b3b"/>
      <stop offset="1" stop-color="#0f2b2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#163032" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#f8f1e3"/>
  <path d="M0 0h1280v720H0z" fill="url(#paper)"/>
  <path d="M118 96h1044v528H118z" rx="28" fill="#fffaf1" stroke="#e5d7bd" filter="url(#shadow)"/>
  <rect x="118" y="96" width="1044" height="64" rx="28" fill="#17393a"/>
  <text x="156" y="137" fill="#fbf7ed" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">DueVault grant workflow</text>
  <text x="978" y="137" fill="#d9c395" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">20 sec overview</text>

  <g transform="translate(154 200)">
    <rect width="286" height="332" rx="18" fill="#ffffff" stroke="#e8dcc7"/>
    <text x="24" y="42" fill="#153537" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">1. Select evidence</text>
    <text x="24" y="70" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="13">Merchant picks invoices or date scope</text>
    <g transform="translate(24 105)">
      <rect width="238" height="54" rx="10" fill="#f6ead4" stroke="#d5b56e"/>
      <rect x="16" y="17" width="20" height="20" rx="5" fill="#b9852f"/>
      <path d="M21 27l4 4 10-12" fill="none" stroke="#fffaf1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="25" fill="#17393a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">INV-1042</text>
      <text x="50" y="43" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="11">3 confirmed Umbra payments</text>
    </g>
    <g transform="translate(24 173)">
      <rect width="238" height="54" rx="10" fill="#f6ead4" stroke="#d5b56e"/>
      <rect x="16" y="17" width="20" height="20" rx="5" fill="#b9852f"/>
      <path d="M21 27l4 4 10-12" fill="none" stroke="#fffaf1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="50" y="25" fill="#17393a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">INV-1045</text>
      <text x="50" y="43" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="11">1 confirmed Umbra payment</text>
    </g>
    <g transform="translate(24 254)">
      <rect width="238" height="46" rx="12" fill="#17393a"/>
      <text x="52" y="29" fill="#fbf7ed" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">4 signatures frozen</text>
    </g>
    <animate attributeName="opacity" values=".72;1;.72" dur="6s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(497 200)">
    <rect width="286" height="332" rx="18" fill="#ffffff" stroke="#e8dcc7"/>
    <text x="24" y="42" fill="#153537" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">2. Issue grant</text>
    <text x="24" y="70" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="13">Access is tied to the auditor wallet</text>
    <g transform="translate(36 112)">
      <circle cx="107" cy="70" r="62" fill="#f4ead6" stroke="#d5b56e"/>
      <path d="M74 72h66m-56-22h46m-35 44h24" stroke="#b9852f" stroke-width="10" stroke-linecap="round"/>
      <rect x="48" y="154" width="118" height="34" rx="17" fill="#17393a"/>
      <text x="73" y="176" fill="#fbf7ed" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">X25519</text>
    </g>
    <g transform="translate(24 254)">
      <rect width="238" height="46" rx="12" fill="#f6ead4" stroke="#d5b56e"/>
      <text x="20" y="29" fill="#17393a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Grant link created</text>
      <circle cx="206" cy="23" r="10" fill="#2d8a5f"/>
    </g>
    <animate attributeName="opacity" values=".72;.72;1;.72" dur="6s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(840 200)">
    <rect width="286" height="332" rx="18" fill="#ffffff" stroke="#e8dcc7"/>
    <text x="24" y="42" fill="#153537" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">3. Auditor reviews</text>
    <text x="24" y="70" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="13">Only granted evidence is visible</text>
    <g transform="translate(24 104)">
      <rect width="238" height="44" rx="10" fill="#17393a"/>
      <text x="16" y="28" fill="#fbf7ed" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">INV-1042</text>
      <text x="154" y="28" fill="#d9c395" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">3 tx</text>
    </g>
    <g transform="translate(24 160)">
      <rect width="238" height="112" rx="12" fill="#f8f1e3" stroke="#e8dcc7"/>
      <text x="18" y="28" fill="#17393a" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Client: Northstar Labs</text>
      <text x="18" y="52" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="12">Amount: 2,400 USDC</text>
      <text x="18" y="76" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="12">Payment: 5nQ...9mK</text>
      <text x="18" y="100" fill="#2d8a5f" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800">Scope verified</text>
    </g>
    <g transform="translate(24 292)">
      <rect width="238" height="8" rx="4" fill="#e5d7bd"/>
      <rect width="168" height="8" rx="4" fill="#b9852f">
        <animate attributeName="width" values="24;168;238;24" dur="6s" repeatCount="indefinite"/>
      </rect>
    </g>
    <animate attributeName="opacity" values=".72;.72;.72;1;.72" dur="6s" repeatCount="indefinite"/>
  </g>

  <path d="M448 366h40" stroke="#b9852f" stroke-width="4" stroke-linecap="round"/>
  <path d="M478 354l14 12-14 12" fill="none" stroke="#b9852f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M791 366h40" stroke="#b9852f" stroke-width="4" stroke-linecap="round"/>
  <path d="M821 354l14 12-14 12" fill="none" stroke="#b9852f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="156" y="582" fill="#765f38" font-family="Inter, Arial, sans-serif" font-size="15">Private stablecoin settlement. Scoped auditor disclosure. No public ledger of customer relationships.</text>
</svg>
